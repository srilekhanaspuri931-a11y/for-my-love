<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For You ❤️</title>
    <style>
        body {
            background-color: #ffe6e6;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 400px;
        }
        h1 { color: #ff4d6d; font-size: 24px; margin-bottom: 15px; }
        p { color: #4a4a4a; font-size: 16px; line-height: 1.6; text-align: justify; }
        .heart { color: #ff4d6d; font-size: 40px; animation: beat 1s infinite alternate; }
        @keyframes beat { to { transform: scale(1.1); } }
    </style>
</head>
<body>
    <div class="card">
        <div class="heart">❤️</div>
        <h1>My Whole World 🌍❤️</h1>
        <p>"I don't even remember how my life was before you came into it, and I can't imagine a future without you anymore. Whether you are close to me or far away, every single beat of my heart belongs only to you. I love you sai varma!"</p>
    </div>
</body>
</html>
