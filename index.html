<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For You ❤️</title>
    <style>
        body {
            background-color: #ffe6e6;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            position: relative;
        }
        .card {
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 350px;
            z-index: 10;
        }
        .profile-img {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid #ff4d6d;
            margin-bottom: 15px;
        }
        h1 { color: #ff4d6d; font-size: 24px; margin: 10px 0; }
        p { color: #4a4a4a; font-size: 15px; line-height: 1.6; text-align: justify; }
        .heart { color: #ff4d6d; font-size: 35px; animation: beat 1s infinite alternate; }
        @keyframes beat { to { transform: scale(1.1); } }

        /* Falling Hearts Animation */
        .falling-heart {
            position: absolute;
            color: #ff4d6d;
            font-size: 20px;
            top: -20px;
            animation: fall linear infinite;
        }
        @keyframes fall {
            to {
                transform: translateY(105vh) rotate(360deg);
            }
        }
        
        .music-btn {
            background: #ff4d6d;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 20px;
            cursor: pointer;
            margin-top: 15px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <!-- Background Music -->
    <audio id="bg-music" loop>
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
    </audio>

    <div class="card">
        <!-- Photo Section -->
        <img src="IMG_20260630_173822.jpg" alt="Our Love" class="profile-img">
        
        <div class="heart">❤️</div>
        <h1>My Whole World 🌍❤️</h1>
        <p>"I don't even remember how my life was before you came into it, and I can't imagine a future without you anymore. Whether you are close to me or far away, every single beat of my heart belongs only to you. I love you sai varma!"</p>
        
        <button class="music-btn" onclick="toggleMusic()">🎵 Play Music</button>
    </div>

    <script>
        // Falling Hearts Generator
        function createHeart() {
            const heart = document.createElement('div');
            heart.classList.add('falling-heart');
            heart.innerHTML = '❤️';
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.animationDuration = Math.random() * 3 + 2 + 's';
            heart.style.opacity = Math.random();
            heart.style.fontSize = Math.random() * 15 + 15 + 'px';
            document.body.appendChild(heart);
            setTimeout(() => { heart.remove(); }, 5000);
        }
        setInterval(createHeart, 300);

        // Music Control
        function toggleMusic() {
            const music = document.getElementById('bg-music');
            const btn = document.querySelector('.music-btn');
            if (music.paused) {
                music.play();
                btn.innerHTML = "⏸️ Pause Music";
            } else {
                music.pause();
                btn.innerHTML = "🎵 Play Music";
            }
        }
    </script>
</body>
</html>
