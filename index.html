<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For You ❤️</title>
    <style>
        body {
            background-color: #ffe6e6;
            font-family: 'Segoe UI', Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            position: relative;
        }
        .card {
            background: white;
            padding: 30px 25px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(255, 77, 109, 0.2);
            text-align: center;
            max-width: 320px;
            width: 85%;
            z-index: 10;
        }
        .profile-img {
            width: 160px;
            height: 160px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid #ff4d6d;
            margin: 0 auto 20px auto;
            display: block;
        }
        h1 { color: #ff4d6d; font-size: 24px; margin: 10px 0; }
        p { color: #4a4a4a; font-size: 15px; line-height: 1.6; text-align: justify; }
        .heart { color: #ff4d6d; font-size: 35px; animation: beat 1s infinite alternate; margin-bottom: 5px; }
        @keyframes beat { to { transform: scale(1.1); } }

        .falling-heart {
            position: absolute;
            color: #ff4d6d;
            top: -20px;
            animation: fall linear infinite;
            pointer-events: none;
        }
        @keyframes fall {
            to { transform: translateY(105vh) rotate(360deg); }
        }
    </style>
</head>
<body>

    <div class="card">
        <!-- Exact photo name linked perfectly here -->
        <img src="IMG_20260630_173844.jpg" alt="Our Love" class="profile-img" onerror="this.onerror=null; this.src='IMG_20260630_173844.JPG';">
        <div class="heart">❤️</div>
        <h1>My Whole World 🌍❤️</h1>
        <p>"I don't even remember how my life was before you came into it, and I can't imagine a future without you anymore. Whether you are close to me or far away, every single beat of my heart belongs only to you. I love you sai varma!"</p>
    </div>

    <script>
        function createHeart() {
            const heart = document.createElement('div');
            heart.classList.add('falling-heart');
            heart.innerHTML = '❤️';
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.animationDuration = Math.random() * 3 + 2 + 's';
            heart.style.opacity = Math.random();
            heart.style.fontSize = Math.random() * 15 + 15 + 'px';
            document.body.appendChild(heart);
            setTimeout(() => { heart.remove(); }, 5000);
        }
        setInterval(createHeart, 300);
    </script>
</body>
</html>
